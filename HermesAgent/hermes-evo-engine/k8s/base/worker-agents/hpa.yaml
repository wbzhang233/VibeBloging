apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-agents-hpa
  namespace: hermes-evo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-agents
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
