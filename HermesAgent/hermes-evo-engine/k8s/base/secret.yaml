# 实际部署时通过 kubectl create secret 或 sealed-secrets 注入
apiVersion: v1
kind: Secret
metadata:
  name: hermes-secrets
  namespace: hermes-evo
type: Opaque
stringData:
  HERMES_MODEL_API_KEY: "REPLACE_WITH_ACTUAL_KEY"
  HERMES_DATABASE_URL: "mysql+aiomysql://hermes:hermes@tdsql-svc:3306/hermes_evo"
  HERMES_REDIS_URL: "redis://redis-svc:6379/0"
  TDSQL_ROOT_PASSWORD: "rootpassword"
  TDSQL_PASSWORD: "hermes"
