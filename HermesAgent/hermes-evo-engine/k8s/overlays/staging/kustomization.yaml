apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hermes-evo

resources:
  - ../../base

# Staging: 中等资源
patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: worker-agents
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
