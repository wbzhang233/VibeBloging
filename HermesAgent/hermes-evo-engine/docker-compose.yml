# HermesAgent Self-Evolution Engine — 本地开发环境
# 使用: docker-compose up -d
# 数据库: TDSQL (MySQL 兼容协议)

services:
  # ── API 服务 ─────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      HERMES_DATABASE_URL: mysql+aiomysql://hermes:hermes@tdsql:3306/hermes_evo
      HERMES_REDIS_URL: redis://redis:6379/0
    depends_on:
      tdsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - skill_store:/app/skill_store
    restart: unless-stopped

  # ── TDSQL (MySQL 兼容) ─────────────────────────────────────────────
  tdsql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: hermes
      MYSQL_PASSWORD: hermes
      MYSQL_DATABASE: hermes_evo
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "hermes", "-phermes"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  mysqldata:
  redisdata:
  skill_store:
